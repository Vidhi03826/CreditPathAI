<!DOCTYPE html>
<html>

<head>

    <title>CreditPathAI</title>

</head>

<body>

    <h1>Credit Risk Prediction System</h1>

    <form action="/predict" method="POST">

        <label>Principal:</label>
       <input type="number" name="principal" required>

        <br><br>

        <label>Terms:</label>
        <input type="number" name="terms" required>

        <br><br>

        <label>Age:</label>
        <input type="number" name="age" required>

        <br><br>

        <label>Education:</label>

        <select name="education">

            <option value="0">
                High School
            </option>

            <option value="1">
                College
            </option>

            <option value="2">
                Bachelor
            </option>

        </select>

        <br><br>

        <label>Gender:</label>

        <select name="gender">

            <option value="0">
                Female
            </option>

            <option value="1">
                Male
            </option>

        </select>

        <br><br>

        <button type="submit">

            Predict

        </button>

    </form>

</body>

</html>
